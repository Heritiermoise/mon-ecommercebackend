services:
  - type: web
    name: shoppro-backend
    runtime: docker
    plan: free
    healthCheckPath: /api/products
    autoDeploy: true
    dockerContext: .
    dockerfilePath: ./Dockerfile
    envVars:
      - key: APP_NAME
        value: ShopPro
      - key: APP_ENV
        value: production
      - key: APP_KEY
        sync: false
      - key: APP_DEBUG
        value: "false"
      - key: APP_URL
        sync: false
      - key: APP_TIMEZONE
        value: UTC
      - key: LOG_CHANNEL
        value: errorlog
      - key: LOG_LEVEL
        value: error
      - key: DB_CONNECTION
        value: mysql
      - key: DB_HOST
        sync: false
      - key: DB_PORT
        value: "17821"
      - key: DB_DATABASE
        value: defaultdb
      - key: DB_USERNAME
        sync: false
      - key: DB_PASSWORD
        sync: false
      - key: MYSQL_ATTR_SSL_CA
        value: cert/ca.pem
      - key: CACHE_DRIVER
        value: file
      - key: SESSION_DRIVER
        value: file
      - key: QUEUE_CONNECTION
        value: sync
      - key: JWT_SECRET
        sync: false
      - key: JWT_TTL
        value: "60"
      - key: MAIL_MAILER
        value: smtp
      - key: MAIL_HOST
        value: sandbox.smtp.mailtrap.io
      - key: MAIL_PORT
        value: "2525"
      - key: MAIL_USERNAME
        sync: false
      - key: MAIL_PASSWORD
        sync: false
      - key: MAIL_ENCRYPTION
        value: tls
      - key: MAIL_FROM_ADDRESS
        value: noreply@shoppro.com
      - key: MAIL_FROM_NAME
        value: ShopPro
      - key: MAISHAPAY_MERCHANT_ID
        sync: false
      - key: MAISHAPAY_PUBLIC_KEY
        sync: false
      - key: MAISHAPAY_SECRET_KEY
        sync: false
      - key: MAISHAPAY_API_URL
        value: https://marchand.maishapay.online
      - key: FRONTEND_URL
        sync: false